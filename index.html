<!doctype html>
<html lang="en">
  <head>
    <script>
      if (navigator.onLine) {
        const analyticsScript = document.createElement('script');
        analyticsScript.async = true;
        analyticsScript.src =
          'https://www.googletagmanager.com/gtag/js?id=G-CLN0X1XD8N';
        document.head.appendChild(analyticsScript);
        window.dataLayer = window.dataLayer || [];
        function gtag() {
          dataLayer.push(arguments);
        }
        gtag('js', new Date());
        gtag('config', 'G-CLN0X1XD8N');
      }
    </script>
    <script>
      if (window.location.hostname === 'expandingtictactoe.vercel.app') {
        const target = new URL('https://thumbfeed.com/expanding-tic-tac-toe/');
        const pathname = window.location.pathname
          .replace(/^\/expanding-tic-tac-toe\/?/, '')
          .replace(/^\/+/, '');
        target.pathname += pathname;
        target.search = window.location.search;
        target.hash = window.location.hash;
        window.location.replace(target);
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Expanding Tic-Tac-Toe</title>
  </head>
  <body class="turn-x">
    <a href="https://thumbfeed.com" class="site-logo">
      <img
        id="desktop-logo"
        class="site-logo-img"
        src="thumbfeed-logo-inline.svg"
        alt="Thumbfeed logo"
      />
      <img
        id="mobile-logo"
        class="site-logo-img"
        src="thumbfeed-logo.svg"
        alt="Thumbfeed logo"
      />
    </a>

    <header>
      <div id="logo-container">
        <img
          id="logo"
          src="./expanding-tic-tac-toe.svg"
          alt="Expanding Tic-Tac-Toe logo"
        />
      </div>
      <div id="status">X to play</div>
      <div id="instruction">
        <span id="instruction-number">3</span> in a row to win.
      </div>
    </header>

    <div id="game-viewport">
      <div id="board"></div>

      <div id="expansion-controls">
        <button
          class="expand-trigger tl"
          type="button"
          aria-label="Expand board up and left"
          disabled
        >
          +
        </button>
        <button
          class="expand-trigger tr"
          type="button"
          aria-label="Expand board up and right"
          disabled
        >
          +
        </button>
        <button
          class="expand-trigger bl"
          type="button"
          aria-label="Expand board down and left"
          disabled
        >
          +
        </button>
        <button
          class="expand-trigger br"
          type="button"
          aria-label="Expand board down and right"
          disabled
        >
          +
        </button>
      </div>
    </div>

    <div class="mode-buttons">
      <button id="btn-multi">Multiplayer</button>
      <button id="btn-reset" class="reset-btn">New Game</button>
      <button id="btn-ai">Play vs AI</button>
    </div>

    <div id="rules-panel" class="rules-panel">
      <h2>How to play</h2>
      <div class="rules-text">
        <p>• Start with standard 3×3 tic-tac-toe.</p>
        <p>• Draw? The last player expands the board in one direction.</p>
        <p>• Board grows by 2 rows and 2 columns.</p>
        <p>• 4 in a row to win after the first expansion</p>
        <p>• 5 in a row for all later ones.</p>
      </div>
      <label class="rules-check">
        <input type="checkbox" id="dont-show-rules" />
        Don't show again
      </label>
      <button id="close-rules">Got it</button>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
