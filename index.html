<!doctype html>
<html lang="en">
  <head>
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-CLN0X1XD8N"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());
      gtag('config', 'G-CLN0X1XD8N');
    </script>
    <script>
      if (
        window.location.hostname === 'expanding-tic-tac-toe.vercel.app' ||
        window.location.hostname === 'expandingtictactoe.vercel.app'
      ) {
        window.location.replace(
          'https://thumbfeed.com/expanding-tic-tac-toe/' +
            window.location.pathname,
        );
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.min.css" />
    <title>Expanding Tic-Tac-Toe</title>
    <link rel="shortcut icon" href="favicon.svg" type="image/x-icon">
  </head>
  <body class="turn-x" oncontextmenu="return false;">
    <a href="https://thumbfeed.com" class="site-logo">
      <img
        id="desktop-logo"
        class="site-logo-img"
        src="thumbfeed-logo-inline.svg"
        alt="Thumbfeed logo"
      />
      <img
        id="mobile-logo"
        class="site-logo-img"
        src="thumbfeed-logo.svg"
        alt="Thumbfeed logo"
      />
    </a>

    <header>
      <div
        id="logo-container"
        style="display: flex; align-items: center; gap: 30px"
      >
        <img
          id="logo"
          src="./expanding-tic-tac-toe.svg"
          alt="Expanding Tic-Tac-Toe logo"
        />
        <!-- <h1>XO++</h1> -->
      </div>
      <div id="status">X to play</div>
      <div id="instruction">
        <span id="instruction-number">3</span> in a row to win.
      </div>
    </header>

    <div id="game-viewport">
      <div id="board"></div>

      <div id="expansion-controls">
        <div class="expand-trigger tl">+</div>
        <div class="expand-trigger tr">+</div>
        <div class="expand-trigger bl">+</div>
        <div class="expand-trigger br">+</div>
      </div>
    </div>

    <div class="mode-buttons">
      <button id="btn-multi">Multiplayer</button>
      <button id="btn-reset" class="reset-btn">New Game</button>
      <button id="btn-ai">Play vs AI</button>
    </div>

    <!-- ai.js contains the getBestMove() function that runs inside a Web Worker -->
    <script src="ai.min.js"></script>
    <!-- main.js contains all game logic, rendering, and board management -->
    <script src="main.min.js"></script>
  </body>
</html>
